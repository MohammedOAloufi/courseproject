{% load static %}

<style>
  header {
    background: #0f0f0f;
    color: white;
    padding: 15px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
  }

  .mobile-menu-toggle,
  .mobile-menu-button {
    display: none;
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    color: #7c3aed;
  }

  .header-menu {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex: 1;
  }

  nav a {
    color: #e5e7eb;
    text-decoration: none;
    margin: 0 15px;
    font-size: 15px;
    white-space: nowrap;
  }

  nav a:hover {
    color: #7c3aed;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .actions a {
    text-decoration: none;
  }

  .actions button {
    background: #7c3aed;
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
  }

  .actions button:hover {
    background: #5b21b6;
  }

  .welcome {
    color: #e5e7eb;
    font-size: 14px;
    margin-right: 8px;
  }

  .logout-btn {
    background: #dc2626;
  }

  .logout-btn:hover {
    background: #b91c1c;
  }

  .icon-btn {
    background: transparent !important;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
  }

  .icon-btn img {
    width: 22px;
    height: 22px;
    filter: brightness(0) invert(1);
    transition: filter 0.25s ease, transform 0.25s ease;
  }

  .icon-btn.heart:hover img {
    filter: brightness(0) saturate(100%)
            invert(24%) sepia(96%) saturate(7461%)
            hue-rotate(357deg) brightness(95%) contrast(120%);
    transform: scale(1.15);
  }

  .icon-btn.cart:hover img {
    filter: brightness(0) saturate(100%)
            invert(36%) sepia(74%) saturate(3566%)
            hue-rotate(246deg) brightness(95%) contrast(115%);
    transform: scale(1.15);
  }

  .icon-btn.cart {
    position: relative;
  }

  .cart-badge {
    position: absolute;
    top: -4px;
    left: -4px;
    background: #dc2626;
    color: white;
    border-radius: 50%;
    font-size: 10px;
    min-width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    font-weight: bold;
  }

  @media (max-width: 768px) {
    header {
      direction: ltr;
      padding: 11px 13px;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "menu logo"
        "panel panel";
      align-items: center;
      gap: 10px;
    }

    .logo {
      grid-area: logo;
      justify-self: end;
      font-size: 18px;
    }

    .mobile-menu-button {
      grid-area: menu;
      justify-self: start;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
    }

    .mobile-menu-button span {
      width: 18px;
      height: 2px;
      border-radius: 99px;
      background: #ffffff;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .mobile-menu-toggle:checked + .mobile-menu-button span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .mobile-menu-toggle:checked + .mobile-menu-button span:nth-child(2) {
      opacity: 0;
    }

    .mobile-menu-toggle:checked + .mobile-menu-button span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .header-menu {
      grid-area: panel;
      direction: rtl;
      display: none;
      width: 100%;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .mobile-menu-toggle:checked ~ .header-menu {
      display: block;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    nav a {
      margin: 0;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      font-size: 12px;
      text-align: center;
    }

    .actions {
      justify-content: stretch;
      gap: 7px;
    }

    .actions button {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.2;
    }

    .actions a {
      flex: 1;
    }

    .actions a button {
      width: 100%;
    }

    .icon-btn {
      padding: 7px;
      flex: 0 0 auto;
    }

    .icon-btn img {
      width: 18px;
      height: 18px;
    }

    .welcome {
      font-size: 12px;
      margin-right: 0;
    }
  }

  @media (max-width: 420px) {
    nav {
      grid-template-columns: 1fr;
    }
  }
</style>

<header>
  <input class="mobile-menu-toggle" type="checkbox" id="mobile-menu-toggle">
  <label class="mobile-menu-button" for="mobile-menu-toggle" aria-label="القائمة">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <div class="logo">GameZone</div>

  <div class="header-menu">
    <nav>
      <a href="{% url 'home' %}">الرئيسية</a>
      {% if user.is_authenticated %}
        <a href="{% url 'orders:order_list' %}">طلباتي</a>
      {% endif %}
      <a href="#">PC</a>
      <a href="#">PlayStation</a>
      <a href="#">Xbox</a>
      <a href="#">العروض</a>
    </nav>

    <div class="actions">
      {% if user.is_authenticated %}
        <span class="welcome">
          مرحبًا، {{ user.username }}
        </span>

        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="logout-btn">تسجيل خروج</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">
          <button>تسجيل دخول</button>
        </a>

        <a href="{% url 'register' %}">
          <button>إنشاء حساب</button>
        </a>
      {% endif %}

      <button class="icon-btn heart" title="المفضلة">
        <img src="{% static 'icons/heart.png' %}" alt="المفضلة">
      </button>

      <button class="icon-btn cart" title="السلة" aria-label="السلة" onclick="window.location.href='{% if user.is_authenticated %}{% url 'orders:cart' %}{% else %}{% url 'login' %}{% endif %}'">
        <img src="{% static 'icons/shopping.png' %}" alt="السلة">
        {% if cart_count and cart_count > 0 %}
          <span class="cart-badge">{{ cart_count }}</span>
        {% endif %}
      </button>
    </div>
  </div>
</header>
